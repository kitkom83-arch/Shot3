<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Telegram Checker</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(17, 28, 46, 0.96);
      --line: rgba(139, 181, 255, 0.16);
      --text: #e8f1ff;
      --muted: #92a8ca;
      --accent: #3390ec;
      --accent-2: #62a8f5;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(51,144,236,.18), transparent 22%),
        radial-gradient(circle at bottom right, rgba(98,168,245,.08), transparent 26%),
        linear-gradient(180deg, #08111d 0%, #0b1220 100%);
    }
    .shell {
      width: min(100%, 920px);
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 18px;
    }
    .panel, .card {
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18,29,49,.98), rgba(13,22,38,.98));
      box-shadow: var(--shadow);
    }
    .panel { padding: 30px; }
    .card { padding: 28px; display:flex; flex-direction:column; justify-content:center; }
    .badge {
      width: 56px; height: 56px; border-radius: 18px; display:grid; place-items:center;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 14px 30px rgba(51,144,236,.35);
      font-size: 24px; font-weight: 800; color: #fff;
      margin-bottom: 18px;
    }
    h1 { margin: 0 0 10px; font-size: 44px; line-height: 1.03; letter-spacing: -.04em; }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .note { margin-top: 18px; padding: 10px 14px; border-radius: 999px; display:inline-flex; background: rgba(16,27,43,.88); border:1px solid var(--line); font-size:13px; }
    h2 { margin: 0 0 8px; font-size: 28px; letter-spacing: -.03em; }
    .sub { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    label { display:block; margin:0 0 7px; color:var(--muted); font-size:13px; font-weight:600; }
    input {
      width:100%; height:50px; padding:0 14px; border-radius:14px; border:1px solid rgba(139,181,255,.16);
      background: linear-gradient(180deg, rgba(24, 37, 60, 0.94), rgba(17, 26, 43, 0.98)); color:var(--text);
      outline:none;
    }
    .field { margin-bottom: 14px; }
    button {
      width:100%; min-height:48px; border:none; border-radius:14px; cursor:pointer; color:#fff; font-weight:800;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      box-shadow: 0 12px 28px rgba(51,144,236,.25);
    }
    .msg { min-height: 20px; margin-top: 14px; color: #ffb6bf; }
    @media (max-width: 860px) { .shell { grid-template-columns: 1fr; } h1 { font-size: 34px; } }
  </style>
</head>
<body>
  <div class="shell">
    <section class="panel">
      <div class="badge">T</div>
      <h1>Telegram All-in-One</h1>
      <p>รวม Cleaner + Checker + Auto Queue ในเว็บเดียว อัปโหลดไฟล์, ล้างข้อมูล, สร้าง clean_ready.csv, เลือกบัญชี Telegram, ตั้งค่าออโต้, และวิ่งคิวต่อจนหมดไฟล์ได้ในหน้าเดียว</p>
      <div class="note">ล็อกอินก่อนใช้งานระบบ</div>
    </section>
    <section class="card">
      <div>
        <h2>เข้าใช้งานระบบ</h2>
        <div class="sub">ใส่ชื่อผู้ใช้และรหัสผ่านของระบบเพื่อเข้าสู่ dashboard</div>
      </div>
      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="กรอกชื่อผู้ใช้" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="กรอกรหัสผ่าน" required />
        </div>
        <button type="submit">Login</button>
      </form>
      <div class="msg" id="msg"></div>
    </section>
  </div>
  <script>
    async function checkLogin() {
      const r = await fetch("/auth/me");
      const data = await r.json();
      if (data.loggedIn) window.location.href = "/";
    }
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const r = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await r.json();
      if (!r.ok) {
        document.getElementById("msg").textContent = data.message || "Login ไม่สำเร็จ";
        return;
      }
      window.location.href = "/";
    });
    checkLogin();
  </script>
</body>
</html>
